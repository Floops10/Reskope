<!doctype html>
<html lang="fr"><head><meta charset="utf-8">
<title>Reskope Network — aperçu</title>
<style>
  @font-face{ font-family:'Reskope Network'; src:url('Reskope-Network.ttf') format('truetype'); }
  :root{ --indigo:#1C0CB3; --cream:#F0EEE8; }
  *{ box-sizing:border-box; margin:0; }
  body{ background:var(--cream); color:var(--indigo);
        font-family:'Reskope Network', sans-serif; padding:48px 56px; }
  .label{ font-family:system-ui,sans-serif; color:#1C0CB3; opacity:.45;
          font-size:12px; letter-spacing:.18em; text-transform:uppercase; margin:32px 0 10px; }
  .big{ font-size:104px; line-height:1.1; letter-spacing:.03em; }
  .row{ font-size:48px; line-height:1.5; letter-spacing:.05em; word-spacing:.1em; }
  .small{ font-size:30px; line-height:1.6; letter-spacing:.05em; }
</style></head>
<body>
  <div class="big">Reskope</div>
  <div class="label">Majuscules</div>
  <div class="row">ABCDEFGHIJKLM<br>NOPQRSTUVWXYZ</div>
  <div class="label">Minuscules (petites capitales)</div>
  <div class="row">abcdefghijklm<br>nopqrstuvwxyz</div>
  <div class="label">Lettres accentuées</div>
  <div class="row">é è ê ë à â ç î ï ô û ù &nbsp; É È À Ç Ô Œ œ</div>
  <div class="label">Chiffres &amp; symboles</div>
  <div class="row">0123456789</div>
  <div class="row">&amp; @ # % + = ( ) ! ? € $ £</div>
  <div class="label">Exemple</div>
  <div class="small">Audit &amp; cartographie numérique.<br>Florian Bouchart — Reskope 2026.</div>
</body></html>
